<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee House - Order</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h2 class="logo">Coffee House</h2>
    </nav>
</header>

<section class="menu">

<div class="cards">

<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?w=500" alt="Espresso">
<h3>Espresso</h3>
<p>₹249</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=500" alt="Cappuccino">
<h3>Cappuccino</h3>
<p>₹299</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=500" alt="Latte">
<h3>Latte</h3>
<p>₹349</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=500" alt="Mocha">
<h3>Mocha</h3>
<p>₹399</p>
<button>Order</button>
</div>

</div>

<br><br>

<div style="text-align:center;">
<a href="index.html" class="order-btn">⬅ Back to Home</a>
</div>
